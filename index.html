<script>

/* MATRIX */
const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

function resize(){
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
}
resize();

const chars="01ABCXYZ#$%";
const size=14;
let drops=Array(Math.floor(window.innerWidth/size)).fill(1);

function draw(){
  ctx.fillStyle="rgba(0,0,0,0.08)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle="#00ff41";
  ctx.font=size+"px monospace";

  for(let i=0;i<drops.length;i++){
    const t=chars[Math.floor(Math.random()*chars.length)];
    ctx.fillText(t,i*size,drops[i]*size);
    if(drops[i]*size>canvas.height) drops[i]=0;
    drops[i]++;
  }
}

/* LONG LOG SYSTEM */
function line(){
  const p = [
    "IP TRACE ACTIVE",
    "NETWORK PACKET ANALYSIS RUNNING",
    "FIREWALL LAYER SCAN IN PROGRESS",
    "ENCRYPTED CHANNELS BEING DECODED",
    "DEVICE SIGNAL MONITORING ENABLED",
    "REMOTE CONNECTION VECTOR CHECKING",
    "DATA STREAM BUFFER OVERFLOW CHECK",
    "SYSTEM MEMORY ACCESS INDEXING",
    "AUTHORIZATION TOKENS BEING VERIFIED",
    "BACKGROUND PROCESS THREAD SCANNING",
    "NETWORK NODE MAP RECONSTRUCTION",
    "SECURITY PROTOCOL LAYER TEST ACTIVE",
    "INCOMING PACKET ROUTING ANALYSIS",
    "USER SESSION BEHAVIOR TRACKING ACTIVE"
  ];

  const extra = [
    " >> SECTOR 7A",
    " >> NODE 192.168.0.14",
    " >> BUFFER LOAD 47%",
    " >> STATUS STABLE",
    " >> LATENCY SPIKE DETECTED",
    " >> CHANNEL OPEN",
    " >> TRACE QUEUED"
  ];

  let out="";
  let blocks=3+Math.floor(Math.random()*4);

  for(let i=0;i<blocks;i++){
    out+=p[Math.floor(Math.random()*p.length)]+" | ";
  }

  out+=extra[Math.floor(Math.random()*extra.length)];

  return out;
}

/* TYPE */
function type(el,text,speed=35,cb){
  let i=0;
  el.textContent="";

  function run(){
    if(i<text.length){
      el.textContent+=text[i];
      i++;
      setTimeout(run,speed);
    } else {
      if(cb) cb();
    }
  }

  run();
}

/* LOGS */
function log(el,delay){
  setTimeout(()=>{
    let i=0;
    const int=setInterval(()=>{
      el.textContent=line();
      i++;
      if(i>25) clearInterval(int);
    },70);
  },delay);
}

/* PROGRESS */
function progress(){
  let p=0;
  const bar=document.getElementById("bar");
  const percent=document.getElementById("percent");

  const int=setInterval(()=>{
    p+=2;
    bar.style.width=p+"%";
    percent.textContent=p+"%";

    if(p>=100) clearInterval(int);
  },60);
}

/* START */
function start(){

  document.getElementById("intro").style.display="none";
  document.getElementById("main").style.display="block";

  setInterval(draw,40);

  progress();

  log(l1,200);
  log(l2,1200);
  log(l3,2200);
  log(l4,3200);
  log(l5,4200);

  setTimeout(()=>{
    document.getElementById("big").textContent="SIMULATION COMPLETE";
  },6000);

  setTimeout(()=>{
    document.getElementById("caution").style.display="block";
  },7000);
}

</script>
